name: Greengage Reusable Package Workflow

on:
  workflow_call:
    inputs:
      version:
        description: 'Version derived from tag (e.g., 6 or 7)'
        required: true
        type: string
      target_os:
        description: 'Target OS (e.g., ubuntu)'
        required: true
        type: string
      target_os_version:
        description: 'Target OS version (e.g., 24.04)'
        required: false
        type: string
        default: ''
      rebuild_builder:
        description: 'Rebuild builder image required'
        required: false
        type: boolean
        default: false
      test_lima:
        description: 'Lima Template (e.g., ubuntu-22.04) for deploy test. Skip if empty'
        required: false
        type: string
        default: ''
      test_docker:
        description: 'Docker Image (e.g., ubuntu:22.04, ubuntu:noble) for deploy test. Skip if empty'
        required: false
        type: string
        default: ''
    secrets:
      ghcr_token:
        description: 'GitHub token for GHCR access'
        required: true

jobs:
  build-deb:
    if: inputs.target_os == 'ubuntu'
    runs-on: ubuntu-24.04
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }}

      - name: Restore & Load SHA image
        uses: greengagedb/greengage-ci/.github/actions/restore-load-image@v25
        with:
          version: ${{ inputs.version }}
          target_os: ${{ inputs.target_os }}
          target_os_version: ${{ inputs.target_os_version }}

      - name: Build Debian packages
        env:
          BUILDER: ghcr.io/${{ github.repository }}/ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}
        run: |
          docker run --rm \
            -v ./deb-packages:/home/gpadmin/gpdb_src/Package \
            -e BUILDNUMBER=${{ github.run_number }} \
            -e SKIP_UNITTESTS=1 \
            "${BUILDER,,}":${{ github.sha }} \
            /bin/bash -c "unset CONFIGURE_FLAGS ; make -C ./gpdb_src/gpAux pkg-deb"
      - name: Upload Debian artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages-${{ inputs.target_os }}${{ inputs.target_os_version || '22.04' }}
          path: deb-packages

      - name: Cache Debian artifacts
        uses: actions/cache/save@v4
        with:
          path: deb-packages
          key:  deb-packages-${{ inputs.target_os }}${{ inputs.target_os_version || '22.04' }}-${{ github.sha }}

  test-docker:
    if: inputs.test_docker != ''
    env:
      TEST_DOCKER: ${{ inputs.test_docker }}
    needs: build-deb
    runs-on: ubuntu-24.04
    steps:
      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: deb-packages-${{ inputs.target_os }}${{ inputs.target_os_version || '22.04' }}
          path: deb-packages
      - name: Start Docker container and install deb package
        run: |
          set -eux
          curl -fsSL https://greengagedb.org/repositories/gpg \
          | sudo gpg --dearmor -o /etc/apt/keyrings/greengagedb.gpg

          docker run --rm \
          -v ./deb-packages:/deb-packages \
          -v /etc/apt/keyrings/greengagedb.gpg:/etc/apt/keyrings/greengagedb.gpg \
          "${TEST_DOCKER}" /bin/bash -c "
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -o Acquire::https::Verify-Peer=false
          apt-get install -y ca-certificates

          echo 'deb [signed-by=/etc/apt/keyrings/greengagedb.gpg] \
          https://greengagedb.org/repositories/ubuntu/22.04/x86_64 \
          greengagedb main' \
          | tee /etc/apt/sources.list.d/greengagedb.list

          apt-get update
          apt-get install -y /deb-packages/*.deb
          dpkg -l sigar 2>/dev/null || true
          dpkg -l greengage*
          "
