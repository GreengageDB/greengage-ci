name: Greengage Reusable Package Workflow

on:
  workflow_call:
    inputs:
      version:
        description: 'Version derived from tag (e.g., 6 or 7)'
        required: true
        type: string
      target_os:
        description: 'Target OS (e.g., ubuntu)'
        required: true
        type: string
      target_os_version:
        description: 'Target OS version (e.g., 24.04)'
        required: false
        type: string
        default: ''
      artifact_prefix:
        description: |
          Artifact name prefix. The full artifact name is constructed as
          {artifact_prefix}-{target_os}{target_os_version}
          (e.g. 'deb-packages-greengage6' -> 'deb-packages-greengage6-ubuntu22.04').
          Also used as the local directory for downloaded packages.
        required: false
        type: string
        default: 'Package'
      test_install:
        description: 'Test installation package in Docker image <target_os>:<target_os_version>'
        required: false
        type: boolean
        default: false
    secrets:
      ghcr_token:
        description: 'GitHub token for GHCR access'
        required: true
env:
  MAKE_TARGET: |-
    ${{ case(
      inputs.target_os == 'ubuntu', 'pkg-deb',
      inputs.target_os == 'rockylinux', 'pkg-rpm',
      'unknown'
    ) }}

jobs:
  build-package:
    name: Build package
    runs-on: ubuntu-24.04
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }}

      - name: Restore & Load SHA image
        uses: greengagedb/greengage-ci/.github/actions/restore-load-image@v25
        with:
          version: ${{ inputs.version }}
          target_os: ${{ inputs.target_os }}
          target_os_version: ${{ inputs.target_os_version }}

      - name: Make package
        env:
          BUILDER: ghcr.io/${{ github.repository }}/ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}
        run: |
          docker run --rm \
            -v ./${{ inputs.artifact_prefix }}:/home/gpadmin/gpdb_src/Package \
            -e BUILDNUMBER=${{ github.run_number }} \
            -e SKIP_UNITTESTS=1 \
            "${BUILDER,,}":${{ github.sha }} \
            /bin/bash -c "unset CONFIGURE_FLAGS ; make -C ./gpdb_src/gpAux $MAKE_TARGET"
      - name: Upload package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_prefix }}-${{ inputs.target_os }}${{ inputs.target_os_version || '22.04' }}
          path: ${{ inputs.artifact_prefix }}

  test-docker-ubuntu:
    if: inputs.test_install && inputs.target_os == 'ubuntu'
    name: Test installation in Ubuntu
    needs: build-package
    runs-on: ubuntu-24.04
    steps:
      - name: Install deb-package in Docker
        uses: greengagedb/greengage-ci/.github/actions/tests/install/deb@v45
        with:
          test_docker: ubuntu:${{ inputs.target_os_version || '22.04' }}
          artifact_name: ${{ inputs.artifact_prefix }}-${{ inputs.target_os }}${{ inputs.target_os_version || '22.04' }}
          verify_commands: |
            dpkg -l sigar 2>/dev/null || true
            dpkg -l greengage*

  test-docker-rockylinux:
    if: inputs.test_install && inputs.target_os == 'rockylinux'
    name: Test installation in Rocky Linux
    needs: build-package
    runs-on: ubuntu-24.04
    steps:
      - name: Install rpm-package in Docker
        uses: greengagedb/greengage-ci/.github/actions/tests/install/rpm@v47
        with:
          test_docker: rockylinux:${{ inputs.target_os_version }}
          artifact_name: ${{ inputs.artifact_prefix }}-${{ inputs.target_os }}${{ inputs.target_os_version }}
          verify_commands: |
            rpm -q sigar 2>/dev/null || true
            rpm -qa 'greengage*'
