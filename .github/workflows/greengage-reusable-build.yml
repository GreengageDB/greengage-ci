# .github/workflows/greengage-reusable-build.yml
name: Greengage Reusable Docker Build Workflow

on:
  workflow_call:
    inputs:
      version:
        description: 'Version derived from tag (e.g., 6 or 7)'
        required: true
        type: string
      target_os:
        description: 'Target OS (e.g., ubuntu)'
        required: true
        type: string
      target_os_version:
        description: 'Target OS version (e.g., 24.04)'
        required: false
        type: string
        default: ''
      skip_unittests:
        description: 'Skip Unit tests before building'
        required: false
        type: string
        default: ''
    secrets:
      ghcr_token:
        description: 'GitHub token for GHCR access'
        required: true
      DOCKERHUB_USERNAME:
        description: 'DockerHub username (for public cache-from images)'
        required: false

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read  # Explicit for default behavior
      packages: write # Required to push to GHCR
      actions: write  # Required for cache
    env:
      IMAGE: ghcr.io/${{ github.repository }}/ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}
      TARGET_OS:  ${{ inputs.target_os }}
      OS_VERSION: ${{ inputs.target_os_version || 22.04 }}
      SKIP_UNITTESTS: ${{ github.event_name != 'pull_request' && '1' || inputs.skip_unittests }}
    steps:
      - name: Maximize disk space
        uses: greengagedb/greengage-ci/.github/actions/maximize-disk-space@v24

      # Checkout default branch
      - name: Checkout Greengage repo
        uses: actions/checkout@v7
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: recursive
          fetch-depth: 0    # Full history for tag resolution
          fetch-tags: true  # Default 'false'
          filter: blob:none # without BLOBs

      # Login to GitHub Container Registry for local PRs OR push
      - name: Login to GitHub Container Registry
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Compute dev tag, add-hosts, and cache-from sources upfront.
      # cache-from priority (highest → lowest):
      #   a) same image + branch/git-tag ref on GHCR  — most recent prior build on this ref
      #   b) same image + 'latest' on GHCR            — last merged state
      #   c) same image + 'testing' on DockerHub      — public, no login needed
      #   d) same image + 'latest' on DockerHub       — public stable release
      #   e) base OS image                             — cold-start fallback
      # Commit SHA is intentionally excluded as a cache key — it's ephemeral.
      - name: Compute dev tag and cache-from sources
        id: meta
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF:      ${{ github.ref }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          IMAGE_LC="${IMAGE,,}"
          DOCKERHUB_IMAGE="${DOCKERHUB_USERNAME}/ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}"
          DOCKERHUB_IMAGE="${DOCKERHUB_IMAGE,,}"

          if [ -n "$HEAD_REF" ]; then
            DEV_TAG=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/_/g')
            DEV_TAG=${DEV_TAG:-unknown}
          elif [[ "$REF" =~ ^refs/tags/(.+)$ ]]; then
            DEV_TAG=$(echo "${BASH_REMATCH[1]}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          elif [[ "$REF" =~ ^refs/heads/(.+)$ ]]; then
            DEV_TAG=$(echo "${BASH_REMATCH[1]}" | sed 's/[^a-zA-Z0-9._-]/_/g')
          else
            DEV_TAG="unknown"
          fi

          case "$TARGET_OS" in
            ubuntu)
              mirror_ip=$(host azure.archive.ubuntu.com | awk '/has address/{print $NF; exit}')
              if curl -sf --max-time 5 "http://${mirror_ip}/ubuntu/" > /dev/null; then
                add_hosts="archive.ubuntu.com:${mirror_ip},security.ubuntu.com:${mirror_ip}"
              fi
              ;;
            rockylinux)
              # TODO: add Azure mirror for Rocky Linux if available
              ;;
          esac

          CACHE_FROM="type=registry,ref=${IMAGE_LC}:${DEV_TAG}
          type=registry,ref=${IMAGE_LC}:latest"
          if [ -n "$DOCKERHUB_USERNAME" ]; then
            CACHE_FROM="${CACHE_FROM}
          type=registry,ref=${DOCKERHUB_IMAGE}:testing
          type=registry,ref=${DOCKERHUB_IMAGE}:latest"
          fi
          CACHE_FROM="${CACHE_FROM}
          type=registry,ref=${{ inputs.target_os }}:${OS_VERSION}"

          echo "dev_tag=${DEV_TAG}"       >> "$GITHUB_OUTPUT"
          echo "add_hosts=${add_hosts}" >> "$GITHUB_OUTPUT"
          {
            echo "cache_from<<EOF"
            echo "$CACHE_FROM"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # Build Docker intermediate image with commit SHA tag
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ci/Dockerfile.${{ inputs.target_os }}
          push: >-
            ${{
              github.event_name == 'push' ||
              (github.event_name == 'pull_request' &&
               github.event.pull_request.head.repo.full_name == github.repository)
            }}
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:${{ steps.meta.outputs.dev_tag }}
          build-args: |
            OS_VERSION=${{ env.OS_VERSION }}
            SKIP_UNITTESTS=${{ env.SKIP_UNITTESTS }}
          add-hosts: ${{ steps.meta.outputs.add_hosts }}
          cache-from: ${{ steps.meta.outputs.cache_from }}
          # inline mode: cache metadata lives inside the image manifest itself.
          # No extra registry namespace needed; works with the registry cache-from above.
          cache-to:   type=inline

      # Save and cache only when push to GHCR did not succeed (fork PRs, unexpected failures)
      - name: Save SHA image
        if: steps.push.outcome != 'success'
        run: docker save ${IMAGE,,}:${{ github.sha }} > ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_${{ github.sha }}.tar

      - name: Cache SHA image
        if: steps.push.outcome != 'success'
        uses: actions/cache/save@v6
        with:
          path: ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_${{ github.sha }}.tar
          key:  ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_${{ github.sha }}
