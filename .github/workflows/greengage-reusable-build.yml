# .github/workflows/greengage-reusable-build.yml
name: Greengage Reusable Docker Build Workflow

on:
  workflow_call:
    inputs:
      version:
        description: 'Version derived from tag (e.g., 6 or 7)'
        required: true
        type: string
      target_os:
        description: 'Target OS (e.g., ubuntu)'
        required: true
        type: string
      target_os_version:
        description: 'Target OS version (e.g., 24.04)'
        required: false
        type: string
        default: ''
      skip_unittests:
        description: 'Skip Unit tests before building'
        required: false
        type: string
        default: ''
    secrets:
      ghcr_token:
        description: 'GitHub token for GHCR access'
        required: true

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read  # Explicit for default behavior
      packages: write # Required to push to GHCR
      actions: write  # Required for cache
    env:
      IMAGE: ghcr.io/${{ github.repository }}/ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}
      OS_VERSION: ${{ inputs.target_os_version || 22.04 }}
      SKIP_UNITTESTS: ${{ github.event_name != 'pull_request' && '1' || inputs.skip_unittests }}
    steps:
      - name: Maximize disk space
        uses: greengagedb/greengage-ci/.github/actions/maximize-disk-space@v24

      # Checkout default branch
      - name: Checkout Greengage repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: recursive
          fetch-depth: 0    # Full history for tag resolution
          fetch-tags: true  # Default 'false'
          filter: blob:none # without BLOBs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Azure Ubuntu mirror
        run: echo "UBUNTU_MIRROR_IP=$(host azure.archive.ubuntu.com | awk '/has address/{print $NF; exit}')" >> $GITHUB_ENV

      # Login to GitHub Container Registry for local PRs OR push
      - name: Login to GitHub Container Registry
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }}

      # Build Docker intermediate image with commit SHA tag
      - name: Build Docker image
        run: docker build
            --add-host=archive.ubuntu.com:$UBUNTU_MIRROR_IP
            --add-host=security.ubuntu.com:$UBUNTU_MIRROR_IP
            --build-arg OS_VERSION
            --build-arg SKIP_UNITTESTS
            --tag ${IMAGE,,}:${{ github.sha }}
            -f ci/Dockerfile.${{ inputs.target_os }}
            .

      # Push developer's and SHA tag image for internal PRs and pushes
      - name: Push developer's and SHA tag image
        id: push
        if: >
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository)
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          if [ -n "$HEAD_REF" ]; then
            DEV_TAG=$(echo "$HEAD_REF" | sed 's/[^a-zA-Z0-9._-]/_/g')
            DEV_TAG=${DEV_TAG:-unknown}
            docker tag  ${IMAGE,,}:${{ github.sha }} ${IMAGE,,}:$DEV_TAG
            docker push ${IMAGE,,}:$DEV_TAG
          fi
          docker push ${IMAGE,,}:${{ github.sha }}

      # Save and cache only when push to GHCR did not succeed (fork PRs, unexpected failures)
      - name: Save SHA image
        if: steps.push.outcome != 'success'
        run: docker save ${IMAGE,,}:${{ github.sha }} > ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_${{ github.sha }}.tar

      - name: Cache SHA image
        if: steps.push.outcome != 'success'
        uses: actions/cache/save@v4
        with:
          path: ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_${{ github.sha }}.tar
          key:  ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_${{ github.sha }}
