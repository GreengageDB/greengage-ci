name: Greengage Reusable Behave Tests

# Environment variables
env:
  COMPOSE_HTTP_TIMEOUT: 400
  DOCKER_COMPOSE: "docker compose"

# Trigger for reusable workflow
on:
  workflow_call:
    inputs:
      version:
        description: 'Greengage version (e.g., 6 or 7)'
        required: true
        type: string
      target_os:
        description: 'Target OS for build (e.g., ubuntu)'
        required: true
        type: string
      target_os_version:
        description: 'Target OS version (e.g., 22.04, 24.04)'
        required: false
        type: string
      python3:
        description: 'Python3 build argument (ignored)'
        required: false
        type: string
        default: ''
    secrets:
      ghcr_token:
        description: 'GitHub token for GHCR access'
        required: true

jobs:
  generate-matrix:
    runs-on: ubuntu-24.04
    outputs:
      run_matrix: ${{ steps.set-matrix.outputs.run_matrix }}
    steps:
      - name: Checkout Greengage repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: recursive

      - name: Get feature list
        id: set-matrix
        run: |
          behave_tests_dir="gpMgmt/test/behave/mgmt_utils"
          features=$(for f in "$behave_tests_dir"/*.feature; do basename "$f" .feature; done)

          run_array=$(echo "$features" | while IFS= read -r f; do
            if ! grep -qE '^@.*\bskip\b' "$behave_tests_dir/$f.feature" 2>/dev/null; then
              echo "\"$f\""
            fi
          done | jq -s -c '.')

          skip_array=$(echo "$features" | while IFS= read -r f; do
            if grep -qE '^@.*\bskip\b' "$behave_tests_dir/$f.feature" 2>/dev/null; then
              echo "\"$f\""
            fi
          done | jq -s -c '.')

          echo "run_matrix=$run_array" >> $GITHUB_OUTPUT

          echo "## Behave Test Matrix" >> $GITHUB_STEP_SUMMARY
          echo "### ⏭️ Skipped (@skip tag detected)" >> $GITHUB_STEP_SUMMARY
          echo "$skip_array" | jq -r '.[]' | while read -r f; do echo "- $f"; done >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Will run" >> $GITHUB_STEP_SUMMARY
          echo "$run_array" | jq -r '.[]' | while read -r f; do echo "- $f"; done >> $GITHUB_STEP_SUMMARY

  behave:
    needs: generate-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        feature: ${{ fromJson(needs.generate-matrix.outputs.run_matrix) }}
    permissions:
      contents: read  # Explicit for default behavior
      packages: read  # Explicit for GHCR access clarity
      actions: write  # Required for cache and artifact upload
    steps:
      - name: Maximize disk space
        uses: greengagedb/greengage-ci/.github/actions/maximize-disk-space@v19

      - name: Restore & Load SHA image
        uses: greengagedb/greengage-ci/.github/actions/restore-load-image@v25
        with:
          version: ${{ inputs.version }}
          target_os: ${{ inputs.target_os }}
          target_os_version: ${{ inputs.target_os_version }}

      - name: Checkout Greengage repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: recursive

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v1

      - name: Fetch SQL dump for ${{ matrix.feature }}
        if: matrix.feature == 'gpexpand'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact_name="sqldump_ggdb${{ inputs.version }}_${{ inputs.target_os }}"
          artifact_archive_name="${{ inputs.target_os }}_postgres_sqldump.tar"

          run_ids=$(gh run list --workflow "Greengage SQL Dump" \
            --limit 100 \
            --json conclusion,status,databaseId \
            --jq 'map(select(.status=="completed" and .conclusion=="success")) | .[].databaseId')

          for run_id in $run_ids; do
            if gh run download "$run_id" --name "$artifact_name" 2>/dev/null ; then
              echo "SQL Dump $artifact_name found at $run_id finished workflow"
              break
            fi
          done

          if tar -xf $artifact_archive_name 2>/dev/null ; then
            rm -f $artifact_archive_name
            echo "SQL Dump $artifact_archive_name sucessfully unpacked and removed"
          else
            echo "::error::Artifact '$artifact_name' not found in any completed workflow run"
            exit 1
          fi

      - name: Run Behave feature ${{ matrix.feature }}
        # continue-on-error: true
        env:
          IMAGE: ghcr.io/${{ github.repository }}/ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}:${{ github.sha }}
        run: |
          export IMAGE=${IMAGE,,}
          bash ci/scripts/run_behave_tests.bash ${{ matrix.feature }}

      - name: Collect logs ${{ matrix.feature }}
        if: always()
        uses: greengagedb/greengage-ci/.github/actions/collect-logs@v26
        with:
          log_path_prefix: "behave_${{ matrix.feature }}"

      # Upload feature artifacts
      - name: Upload ${{ matrix.feature }} artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}_${{ matrix.feature }}_ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}_results
          path: |
            allure-results
            logs_cdw
            logs_sdw1
            logs_sdw2
            logs_sdw3
          retention-days: 7
          if-no-files-found: ignore  # Ignore if no artifacts are found

  collect-results:
    needs: behave
    if: always()
    runs-on: ubuntu-24.04
    permissions:
      contents: read  # Explicit for default behavior
      packages: read  # Explicit for GHCR access clarity
      actions: write  # Required for artifact upload
    steps:
      # Download artifacts from behave jobs
      - name: Download feature artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: behave_*_results
          merge-multiple: true

      # Install Allure CLI
      - name: Install Allure CLI
        run: |
          # Download Allure .deb package
          curl -o allure_2.34.0-1_all.deb -L https://github.com/allure-framework/allure2/releases/download/2.34.0/allure_2.34.0-1_all.deb
          # Update package index
          sudo apt-get update
          # Install Allure and dependencies
          sudo apt-get install -y ./allure_2.34.0-1_all.deb
          # Remove .deb file
          rm allure_2.34.0-1_all.deb
          # Verify installation
          allure --version

      # Generate Allure report
      - name: Generate Allure report
        run: |
          set -e
          cd artifacts
          [ -d allure-results ] && allure generate allure-results -o allure-report --clean || echo "No allure-results to generate report"

      # Upload final artifact
      - name: Upload final artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.job }}_all_ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}
          path: artifacts
          retention-days: 7
          if-no-files-found: warn  # Warning if no artifacts are found
