# .github/workflows/greengage-reusable-tests-resgroup.yml
name: Greengage Reusable resource groups Tests

# Trigger for reusable workflow
on:
  workflow_call:
    inputs:
      version:
        description: 'Greengage version (e.g., 6 or 7)'
        required: true
        type: string
      target_os:
        description: 'Target OS for build (e.g., ubuntu, centos, rockylinux)'
        required: true
        type: string
      target_os_version:
        description: 'Target OS version (e.g., 22.04, 24.04)'
        required: false
        type: string
      python3:
        description: 'Python3 build argument (ignored)'
        required: false
        type: string
        default: ''
    secrets:
      ghcr_token:
        description: 'GitHub token for GHCR access'
        required: true

jobs:
  optimizer:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        optimizer: ${{ fromJson(inputs.version == '6' && '["postgres"]' || '["orca", "postgres"]') }}
    permissions:
      contents: read  # Explicit for default behavior
      packages: read  # Explicit for GHCR access clarity
      actions: write  # Required for cache and artifact upload
    env:
      IMAGE_NAME: ggdb${{ inputs.version }}_${{ inputs.target_os }}${{ inputs.target_os_version }}
      IMAGE_REPO: ghcr.io/${{ github.repository }}
      IMAGE_SHA: ${{ github.sha }}
      TEST_OS: ${{ inputs.target_os }}
      STATEMENT_MEM: ${{ inputs.version == '7' && '125MB' || '250MB' }}
      SSH_COMMAND: "ssh qemu-vm"

    steps:
      - name: Setup QEMU
        run: |
          set -eux
          sudo apt update
          sudo DEBIAN_FRONTEND=noninteractive apt install -y qemu-kvm qemu-utils cloud-image-utils libguestfs-tools openssh-client

      - name: Download Ubuntu cloud image
        if: steps.cache-qemu.outputs.cache-hit != 'true'
        run: |
          set -eux
          wget -q -O ubuntu-22.04.img \
            https://cloud-images.ubuntu.com/jammy/current/jammy-server-cloudimg-amd64.img

      - name: Restore & Load SHA image
        uses: greengagedb/greengage-ci/.github/actions/restore-load-image@refactor/package-workflow-simplify
        with:
          version: ${{ inputs.version }}
          target_os: ${{ inputs.target_os }}
          target_os_version: ${{ inputs.target_os_version }}
          save_tar: "true"

      - name: Create env file
        env:
          OPTIMIZER:  ${{ matrix.optimizer == 'orca' && 'on' || 'off' }}
          IMAGE_FILE: ${{ env.IMAGE_NAME }}_${{ env.IMAGE_SHA }}.tar
        run: |
          mkdir vm-home

          export IMAGE=${IMAGE_REPO,,}/${IMAGE_NAME}:${IMAGE_SHA}

          cat > vm-home/.env.tests <<EOF
          CI=true
          TEST_OS=$TEST_OS
          OPTIMIZER=$OPTIMIZER
          STATEMENT_MEM=$STATEMENT_MEM
          IMAGE=$IMAGE
          IMAGE_FILE=$IMAGE_FILE
          DOCKER_API_VERSION=1.41
          EOF

      - name: Create cloud-init script
        run: |
          set -eux

          cat > vm-home/cloud-init <<'EOF0'
          # cloud-init setup script
          set -e

          source /home/gpadmin/.env.tests

          curl -fsSL https://get.docker.com -o get-docker.sh
          sh get-docker.sh --version 20.10
          systemctl enable --now docker

          cd /home/gpadmin
          mkdir -p logs

          docker load < $IMAGE_FILE
          rm $IMAGE_FILE

          # Extract test script from Image instaed of GIT
          docker create --name temp-container $IMAGE
          docker cp temp-container:/home/gpadmin/gpdb_src/ci ./ci
          docker rm temp-container
          EOF0

          cat vm-home/cloud-init

      - name: Create VM disk and cloud-init config
        env:
          OPTIMIZER:  ${{ matrix.optimizer == 'orca' && 'on' || 'off' }}
          IMAGE_FILE: ${{ env.IMAGE_NAME }}_${{ env.IMAGE_SHA }}.tar
        run: |
          set -eux
          mkdir -p vm-work

          # Move image to VM Home folder
          mv ${IMAGE_FILE} vm-home/

          # Copy virtual disk to VM Work folder
          cp ubuntu-22.04.img vm-work/vm-disk.qcow2

          cd vm-work

          # Extract kernel from cloud image for usin as external
          sudo virt-get-kernel --add vm-disk.qcow2
          sudo chmod -R a+rwX .

          # Make clear links to kernel files
          for f in initrd vmlinuz ; do
            find . -maxdepth 1 -type f -name "$f*" -exec ln -sf {} $f \;
          done

          qemu-img resize vm-disk.qcow2 20G

          ssh-keygen -t rsa -f id_rsa -q -N ""

          # Create cloud-init user-data
          cat > user-data <<EOF1
          #cloud-config
          packages:
            - openssh-server
          users:
            - name: gpadmin
              sudo: ALL=(ALL) NOPASSWD:ALL
              shell: /bin/bash
              uid: $UID
            - name: root
              ssh_authorized_keys:
                - $(cat id_rsa.pub)
          runcmd:
            - systemctl enable --now ssh
            - cp -r /home/gpadmin/.ssh /tmp/ssh_backup
            - mount -t 9p -o trans=virtio,version=9p2000.L,rw hostshare /home/gpadmin
            - cp -r /tmp/ssh_backup/. /home/gpadmin/.ssh
            - cp ../vm-home/.env.tests /home/gpadmin/.env.tests
            - chown -R gpadmin:gpadmin /home/gpadmin
            - chmod 700 /home/gpadmin/.ssh
            - chmod 600 /home/gpadmin/.ssh/authorized_keys
            - bash /home/gpadmin/cloud-init
          EOF1

          # Create meta-data
          echo "instance-id: github-actions-vm" > meta-data

          # Create cloud-init ISO
          cloud-localds seed.img user-data meta-data

      - name: Start QEMU VM with shared volume and cgroups v1
        run: |
          set -eux
          rm -f vm-home/logs/.exitcode
          cd vm-work
          sudo qemu-system-x86_64 \
            -machine type=pc,accel=kvm \
            -cpu host \
            -smp 4 \
            -m 8192 \
            -pidfile qemu.pid \
            -drive file=vm-disk.qcow2,format=qcow2,if=virtio \
            -drive file=seed.img,format=raw,if=virtio \
            -netdev user,id=net0,hostfwd=tcp::2222-:22 \
            -device virtio-net-pci,netdev=net0 \
            -fsdev local,security_model=passthrough,id=fsdev0,path=../vm-home \
            -device virtio-9p-pci,id=fs0,fsdev=fsdev0,mount_tag=hostshare \
            -kernel vmlinuz \
            -initrd initrd \
            -append "root=/dev/vda1 ro console=tty1 console=ttyS0 systemd.unified_cgroup_hierarchy=0" \
            -display none \
            -serial stdio &

      - name: Configure SSH
        if: always()
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config <<EOF
          Host qemu-vm
            HostName 127.0.0.1
            Port 2222
            User root
            IdentityFile ${GITHUB_WORKSPACE}/vm-work/id_rsa
            StrictHostKeyChecking no
          EOF
          chmod 600 ~/.ssh/config

      - name: Wait for QEMU VM SSH and cloud-init are ready
        run: |
          timeout 360 bash -c '
            until ssh -q qemu-vm exit; do
              echo "Waiting for SSH (qemu-vm) to become available..."
              sleep 5
            done
          ' || { echo "Timeout reached: SSH is not available"; exit 1; }

          EXIT_CODE=0
          ${SSH_COMMAND} "echo 'Waiting for cloud-init to be done...' && sudo cloud-init status --wait" || EXIT_CODE=$?
          if [[ "$EXIT_CODE" -eq 2 ]]; then echo "cloud-init status check has some warnings!"; exit 0; fi
          exit $EXIT_CODE

      - name: Run resgorup tests
        run: |
          ${SSH_COMMAND} "cd /home/gpadmin \
                          && export \$(cat .env.tests | xargs) \
                          && bash ci/scripts/run_resgroup_test.bash"

      - name: Collect logs
        if: always()
        uses: greengagedb/greengage-ci/.github/actions/collect-logs@v29
        with:
          log_dir: '/logs'
          log_path_prefix: 'ggdb_test'
          docker_host: 'ssh://qemu-vm'

      - name: Normalize permissions
        if: always()
        run: |
          sudo chmod -R a+rwX vm-home/ vm-work/
          ls -lah vm-home/* vm-work/* || true
          tar -cf logs.tar vm-home/logs*

      - name: Upload resgroup ${{ github.job }} ${{ matrix.optimizer }} artifacts
        if: always()  # Run even if previous step fails
        uses: actions/upload-artifact@v4
        with:
          name: resgroup_${{ env.IMAGE_NAME }}_${{ github.job }}_${{ matrix.optimizer }}
          path: logs.tar
          retention-days: 7
          if-no-files-found: warn  # Warning if no artifacts are found

      - name: Cleanup VM
        if: always()
        run: |
          set -e
          PIDFILE=vm-work/qemu.pid
          if [ -f $PIDFILE ]; then
            # Read PID safely
            pid=$(cat $PIDFILE) && {
              # Graceful shutdown first
              sudo kill $pid 2>/dev/null || true
              sleep 3
              # Check if process still exists with the same PID and name
              if ps -p $pid >/dev/null && [ "$(ps -p $pid -o comm=)" = "qemu-system-x86" ]; then
                echo "Force killing QEMU process $pid"
                sudo kill -9 $pid 2>/dev/null || true
              fi
            }
            # Cleanup PID file
            rm -f $PIDFILE
          fi
          # Additional cleanup
          sudo pkill -f "qemu-system-x86_64" || true
