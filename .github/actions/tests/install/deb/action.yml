# .github/actions/tests/install/deb/action.yml
name: Test deb package installation
description: Run deb package installation test inside a Docker container

inputs:
  test_docker:
    description: Docker image to test installation in
    required: true
  artifact_name:
    description: Name of the deb artifact to download
    required: true
  add_greengage_repo:
    description: Whether to add Greengage apt repository
    default: 'true'
  greengage_repo_url:
    description: Base URL of the Greengage apt repository
    default: 'https://greengagedb.org'
  pre_install_commands:
    description: Commands to run before apt-get install
    default: ''
  verify_commands:
    description: Commands to run after installation to verify it
    default: ''
  summary:
    description: Write installed package info to GitHub Actions job summary
    default: 'true'

runs:
  using: composite
  steps:
    - name: Download deb artifact
      uses: actions/download-artifact@v4
      with:
        name: ${{ inputs.artifact_name }}
        path: deb-packages

    - name: Test package installation
      id: test
      continue-on-error: true
      shell: bash
      env:
        ADD_GREENGAGE_REPO: ${{ inputs.add_greengage_repo }}
        GREENGAGE_REPO_URL: ${{ inputs.greengage_repo_url }}
        PRE_INSTALL_COMMANDS: ${{ inputs.pre_install_commands }}
        VERIFY_COMMANDS: ${{ inputs.verify_commands }}
      run: |
        set -eux
        mkdir summary
        curl -fsSL ${GREENGAGE_REPO_URL}/repositories/gpg \
          | sudo gpg --dearmor -o /etc/apt/keyrings/greengagedb.gpg || (echo "Error: ${GREENGAGE_REPO_URL} GPG installation" > summary/error.log ; exit 1)

        docker run --rm \
          -v "$(pwd)/deb-packages:/deb-packages" \
          -v "$(pwd)/summary:/summary" \
          -v /etc/apt/keyrings/greengagedb.gpg:/etc/apt/keyrings/greengagedb.gpg \
          -e ADD_GREENGAGE_REPO \
          -e GREENGAGE_REPO_URL \
          -e PRE_INSTALL_COMMANDS \
          -e VERIFY_COMMANDS \
          "${{ inputs.test_docker }}" /bin/bash -c '
            set -eux
            export DEBIAN_FRONTEND=noninteractive
            apt-get update -o Acquire::https::Verify-Peer=false -q
            apt-get install -y ca-certificates gpg

            if [ "$ADD_GREENGAGE_REPO" = "true" ]; then
              OS_VERSION=$(. /etc/os-release && echo $VERSION_ID)
              echo "deb [signed-by=/etc/apt/keyrings/greengagedb.gpg] \
                ${GREENGAGE_REPO_URL}/repositories/ubuntu/${OS_VERSION}/x86_64 \
                greengagedb main" \
                > /etc/apt/sources.list.d/greengagedb.list
            fi

            eval "$PRE_INSTALL_COMMANDS" || (echo "Error: pre-insatll commands: '${PRE_INSTALL_COMMANDS}' execution" >> /summary/error.log ; exit 1)
            apt-get update -q
            apt-get install -y /deb-packages/*.deb  || (echo "Error: 'apt-get install -y /deb-packages/*.deb' execution" >> /summary/error.log ; exit 1)
            eval "$VERIFY_COMMANDS" || (echo "Error: verify commands: '${VERIFY_COMMANDS}' execution" >> /summary/error.log ; exit 1)

            for deb in /deb-packages/*.deb; do
              pkg=$(dpkg-deb -f "$deb" Package)
              dpkg -s "$pkg" 2>/dev/null > /summary/${pkg}.txt \
                || echo "Status: not-installed" > /summary/${pkg}.txt
            done
          '

          echo "No errors" > summary/error.log

    - name: Upload summary artifacts
      id: upload-summary
      uses: actions/upload-artifact@v7
      with:
        name: tests_install_deb_${{ inputs.test_docker }}
        path: summary/

    - name: Display job summary
      if: inputs.summary == 'true'
      shell: bash
      env:
        ARTIFACT_URL: ${{ steps.upload-summary.outputs.artifact-url }}
        TEST_DOCKER: ${{ inputs.test_docker }}
      run: |
        echo "## Deb installation test: \`${TEST_DOCKER}\`" >> "${GITHUB_STEP_SUMMARY}"
        echo "" >> "${GITHUB_STEP_SUMMARY}"
        echo "📦 [Download package info](${ARTIFACT_URL})" >> "${GITHUB_STEP_SUMMARY}"
        echo "" >> "${GITHUB_STEP_SUMMARY}"

        for f in summary/*.txt; do
          pkg=$(basename "$f" .txt)
          status=$(grep '^Status:' "$f" | head -1)

          if echo "$status" | grep -q 'install ok installed'; then
            icon="✅"
          else
            icon="❌ not installed"
          fi

          echo "<details>" >> "${GITHUB_STEP_SUMMARY}"
          echo "<summary>${icon} <b>${pkg}</b></summary>" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          # Pass 1: table of single-line fields
          echo "| Field | Value |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|-------|-------|" >> "${GITHUB_STEP_SUMMARY}"
          while IFS= read -r line; do
            if [[ "$line" =~ ^([A-Za-z0-9_-]+):\ (.+)$ ]]; then
              field="${BASH_REMATCH[1]}"
              value="${BASH_REMATCH[2]}"
              echo "| \`${field}\` | ${value} |" >> "${GITHUB_STEP_SUMMARY}"
            fi
          done < "$f"
          echo "" >> "${GITHUB_STEP_SUMMARY}"

          # Pass 2: multiline blocks in details
          current_header=""
          block=""
          in_block=false
          while IFS= read -r line; do
            if [[ "$line" =~ ^[[:space:]] ]]; then
              # continuation line - add to block
              block+="${line#"${line%%[! ]*}"}"$'\n'
              in_block=true
            else
              # flush previous block
              if $in_block && [ -n "$block" ]; then
                echo "<details><summary><code>${current_header}</code></summary>" >> "${GITHUB_STEP_SUMMARY}"
                echo "" >> "${GITHUB_STEP_SUMMARY}"
                echo '```' >> "${GITHUB_STEP_SUMMARY}"
                echo "${block}" >> "${GITHUB_STEP_SUMMARY}"
                echo '```' >> "${GITHUB_STEP_SUMMARY}"
                echo "" >> "${GITHUB_STEP_SUMMARY}"
                echo "</details>" >> "${GITHUB_STEP_SUMMARY}"
                block=""
                in_block=false
              fi
              # remember current field name as potential header
              if [[ "$line" =~ ^([A-Za-z0-9_-]+): ]]; then
                current_header="${BASH_REMATCH[1]}"
              fi
            fi
          done < "$f"
          # flush last block if any
          if $in_block && [ -n "$block" ]; then
            echo "<details><summary><code>${current_header}</code></summary>" >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo '```' >> "${GITHUB_STEP_SUMMARY}"
            echo "${block}" >> "${GITHUB_STEP_SUMMARY}"
            echo '```' >> "${GITHUB_STEP_SUMMARY}"
            echo "" >> "${GITHUB_STEP_SUMMARY}"
            echo "</details>" >> "${GITHUB_STEP_SUMMARY}"
          fi

          echo "" >> "${GITHUB_STEP_SUMMARY}"
          echo "</details>" >> "${GITHUB_STEP_SUMMARY}"
          echo "" >> "${GITHUB_STEP_SUMMARY}"
        done

    - name: Fail if test failed
      if: steps.test.outcome == 'failure'
      shell: bash
      run: exit 1
