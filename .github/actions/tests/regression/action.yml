# .github/actions/tests/regression/action.yml
name: "Regression Tests"
description: "Run regression tests with specified optimizer"

inputs:
  image:
    description: 'Greengage image for tests'
    required: true
  target_os:
    description: 'Target OS (e.g., ubuntu)'
    required: true
  target_os_version:
    description: 'Target OS version (e.g., 22.04)'
    required: false
    default: ''
  optimizer:
    description: 'Optimizer for tests (e.g., postgres, orca)'
    required: true
  dump_db:
    description: 'Dump database after tests'
    required: false
    default: ''
  log_dir:
    description: 'Directory for logs mount in container'
    required: false
    default: '/mnt/logs'
  log_name:
    description: 'Container name for log collection'
    required: false
    default: 'ggdb_test'

runs:
  using: "composite"
  steps:
    - name: Regression Tests with optimizer '${{ inputs.optimizer }}'${{ inputs.dump_db && ' and DB dump'}}
      shell: bash
      env:
        CI: 'true'
        IMAGE: ${{ inputs.image }}
        TEST_OS: ${{ inputs.target_os }}
        MAKE_TEST_COMMAND: "-k PGOPTIONS='-c optimizer=${{ inputs.optimizer == 'orca' && 'on' || 'off' }}' installcheck-world"
        LOG_DIR:  ${{ inputs.log_dir  }}
        LOG_NAME: ${{ inputs.log_name }}
      run: |
        mkdir -p coverage

        docker run --name $LOG_NAME \
          -v $LOG_DIR:/logs \
          -v ${PWD}/coverage:/tmp/coverage-data \
          -e CI \
          -e TEST_OS \
          -e MAKE_TEST_COMMAND \
          --sysctl 'kernel.sem=500 1024000 200 4096' \
          ${IMAGE,,} \
          /bin/bash /home/gpadmin/gpdb_src/concourse/scripts/ic_gpdb.bash

    - name: Collect DB dump
      if: always() && inputs.dump_db != ''
      shell: bash
      env:
        LOG_NAME: ${{ inputs.log_name }}
        TEST_OS: ${{ inputs.target_os }}
        TEST_OS_VERSION: ${{ inputs.target_os_version }}
        LOG_DIR: ${{ inputs.log_dir }}
      run: |
        mkdir -p "$LOG_DIR" sqldump
        docker cp "$LOG_NAME:/home/gpadmin/sqldump/dump.sql" ./sqldump/dump.sql
        tar -rf "${LOG_DIR}/${TEST_OS}${TEST_OS_VERSION}_postgres_sqldump.tar" sqldump/dump.sql
