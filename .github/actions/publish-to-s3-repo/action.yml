# .github/actions/publish-to-s3-repo/action.yml

name: Publish packages to S3 repository
description: >
  Publishes already-downloaded package files from a release page to an
  S3-backed repository via repomanager. Shared by any action/workflow that
  first obtains packages some other way (CI run artifact, release asset, ...).

inputs:
  packages_dir:
    description: 'Local directory containing the package files to publish'
    required: true
  extensions:
    description: >
      Space-separated list of package file extensions to look for inside
      packages_dir (e.g. 'deb ddeb'). Extend this once rpm publishing is
      supported (e.g. 'deb ddeb rpm').
    required: false
    default: 'deb ddeb'
  s3_prefix:
    description: >
      Repository path prefix inside the S3 bucket
      (e.g. "ubuntu/22.04/x86_64").
    required: true
  repomanager_image:
    description: 'Repomanager container image'
    required: false
    default: 'ghcr.io/greengagedb/repomanager-ng-tool-x86_64:latest'
  aws_bucket:
    description: 'S3 bucket name'
    required: true
  aws_endpoint_url:
    description: 'S3 endpoint'
    required: true
  aws_access_key_id:
    description: 'Access key ID for the S3 bucket'
    required: true
  aws_secret_access_key:
    description: 'Secret access key for the S3 bucket'
    required: true
  gpg_private_key:
    description: 'GPG private key (armored) for repository signing'
    required: true
  apt_codename:
    description: 'APT codename (e.g. greengagedb, jammy, bullseye)'
    required: false
    default: 'greengagedb'
  apt_component:
    description: 'APT component (e.g. main, contrib)'
    required: false
    default: 'main'
  ghcr_login:
    description: 'GHCR login to access repomanager image'
    required: true
  ghcr_password:
    description: 'GitHub Container Registry token (PAT)'
    required: true

outputs:
  published:
    description: '"true" if packages were published, "false" if they were already up to date'
    value: ${{ steps.check.outputs.already_published == 'true' && 'false' || steps.publish.outputs.published }}

runs:
  using: composite
  steps:
    - name: Check published state via aws s3 ls
      id: check
      shell: bash
      env:
        AWS_ACCESS_KEY_ID:     ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        AWS_ENDPOINT_URL:      ${{ inputs.aws_endpoint_url }}
        S3_PACKAGES_URI:       's3://${{ inputs.aws_bucket }}/repositories/${{ inputs.s3_prefix }}/packages/'
        PACKAGES_DIR:          ${{ inputs.packages_dir }}
        EXTENSIONS:            ${{ inputs.extensions }}
      run: |
        set -euo pipefail
        shopt -s nullglob

        echo "Checking S3: $S3_PACKAGES_URI"

        ls_output=$(aws s3 ls "$S3_PACKAGES_URI" \
          ${AWS_ENDPOINT_URL:+--endpoint-url "$AWS_ENDPOINT_URL"} 2>/dev/null || true)

        files=()
        for ext in $EXTENSIONS; do
          files+=("$PACKAGES_DIR"/*."$ext")
        done

        if [ ${#files[@]} -eq 0 ]; then
          echo "::error::No files matching extensions [$EXTENSIONS] found in $PACKAGES_DIR"
          exit 1
        fi

        {
          echo "files<<PKG_FILES_EOF"
          printf '%s\n' "${files[@]}"
          echo "PKG_FILES_EOF"
        } >> "$GITHUB_OUTPUT"

        missing=()
        for package in "${files[@]}"; do
          filename=$(basename "$package")
          if echo "$ls_output" | awk '{print $NF}' | grep -qFx "$filename"; then
            echo "already in S3: $filename"
          else
            echo "missing in S3: $filename"
            missing+=("$filename")
          fi
        done

        if [ ${#missing[@]} -eq 0 ]; then
          echo "All packages already published - skipping"
          echo "already_published=true" >> $GITHUB_OUTPUT
        else
          echo "Packages queued for publishing: ${missing[*]}"
          echo "already_published=false" >> $GITHUB_OUTPUT
        fi

    - name: Import GPG key for repository signing
      shell: bash
      env:
        GPG_PRIVATE_KEY: ${{ inputs.gpg_private_key }}
      run: |
        GNUPGHOME=$(mktemp -d)
        chmod 700 "$GNUPGHOME"

        echo "$GPG_PRIVATE_KEY" | gpg --batch --homedir "$GNUPGHOME" --import

        gpg --homedir "$GNUPGHOME" \
            --export \
            --output "$GNUPGHOME/pubring.gpg"

        gpg --homedir "$GNUPGHOME" \
            --export-secret-keys \
            --output "$GNUPGHOME/secring.gpg"

        echo "GNUPGHOME=$GNUPGHOME" >> $GITHUB_ENV

    - name: Publish packages via repomanager
      id: publish
      if: steps.check.outputs.already_published != 'true'
      shell: bash
      env:
        AWS_BUCKET:            ${{ inputs.aws_bucket }}
        AWS_ENDPOINT_URL:      ${{ inputs.aws_endpoint_url }}
        AWS_ACCESS_KEY_ID:     ${{ inputs.aws_access_key_id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws_secret_access_key }}
        APT_CODENAME:          ${{ inputs.apt_codename }}
        APT_COMPONENT:         ${{ inputs.apt_component }}
        STORAGE_TYPE:          s3
        S3_PREFIX:             repositories/${{ inputs.s3_prefix }}
        FILES:                 ${{ steps.check.outputs.files }}
      run: |
        set -euo pipefail

        export AWS_CONFIG_FILE=$(pwd)/aws-config
        cat > "$AWS_CONFIG_FILE" << 'EOF'
        [default]
        s3 =
            addressing_style = path
        request_checksum_calculation = when_required
        response_checksum_validation = when_required
        EOF

        echo "${{ inputs.ghcr_password }}" \
          | docker login ghcr.io -u ${{ inputs.ghcr_login }} --password-stdin

        REPOMANAGER="docker run --rm \
          -u $(id -u):$(id -g) \
          -v $(pwd):/data \
          -v "${GNUPGHOME}":"${GNUPGHOME}" \
          -v ${AWS_CONFIG_FILE}:/etc/aws-config \
          -e AWS_CONFIG_FILE=/etc/aws-config \
          -e AWS_BUCKET \
          -e AWS_ENDPOINT_URL \
          -e AWS_ACCESS_KEY_ID \
          -e AWS_SECRET_ACCESS_KEY \
          -e APT_CODENAME \
          -e APT_COMPONENT \
          -e STORAGE_TYPE \
          -e GNUPGHOME \
          ${{ inputs.repomanager_image }}"

        failed=()
        while IFS= read -r file; do
          [ -z "$file" ] && continue
          filename=$(basename "$file")
          echo "Publishing: $filename -> $S3_PREFIX"
          $REPOMANAGER add "$S3_PREFIX" "/data/$file" || failed+=("$filename")
        done <<< "$FILES"

        if [ ${#failed[@]} -gt 0 ]; then
          echo "::error::Failed to publish: ${failed[*]}"
          exit 1
        fi

        echo "All packages published successfully"
        echo "published=true" >> $GITHUB_OUTPUT
